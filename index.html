<!doctype html>
<html>
    <head>
        <title>PopChoice</title>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

    </head>
    <body>
        <script type="module" src="index.js"></script>
        <header>
            <img class="logo-img" src="images/logo.png">
            <h1 class="header-text">PopChoice</h1>
        </header>
        <main>
            <form id="qn">
                <section class="form-section">
                    <label>What&apos;s your favorite movie and why?</label>
                    <textarea class="q1" placeholder="The Shawshank Redemption
Because it taught me to never give up hope no matter how hard life gets"></textarea>
                </section>
                <section class="form-section">
                    <label>Are you in the mood for something
new or a classic?</label>
                    <textarea class="q2" placeholder="I want to watch movies that were released after 1990"></textarea>
                </section>
                <section class="form-section">
                    <label>Do you wanna have fun or do you want something serious?</label>
                    <textarea class="q3" placeholder="I want to watch something stupid and fun"></textarea>
                </section>
                <button type="submit">Let&apos;s Go</button>
            </form>
            <section class="movie-details hide">
                <h2>School of Rock (2009)</h2>
                <p>A fun and stupid movie about a wannabe rocker turned fraud substitute teacher forming a rock band with his students to win the Battle of the Bands</p>
                <button>Go Again</button>
            </section>
        </main>
    </body>
</html>
